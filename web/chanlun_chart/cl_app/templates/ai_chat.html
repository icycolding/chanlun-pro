<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AGI Market Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.06);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(15, 23, 42, 0.16);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(15, 23, 42, 0.24);
        }
        body {
            font-family: "SF Pro Display", "SF Pro Text", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
            background:
                radial-gradient(circle at top left, rgba(191, 219, 254, 0.7), transparent 28%),
                radial-gradient(circle at top right, rgba(254, 249, 195, 0.6), transparent 24%),
                linear-gradient(180deg, #f7f8fb 0%, #eef2f7 100%);
            color: #0f172a;
        }
        .prose p {
            margin-bottom: 0.5em;
        }
        .prose ul {
            list-style-type: disc;
            padding-left: 1.5em;
            margin-bottom: 0.5em;
        }
        .prose ol {
            list-style-type: decimal;
            padding-left: 1.5em;
            margin-bottom: 0.5em;
        }
        .prose pre {
            background-color: #111827;
            padding: 1em;
            border-radius: 0.5em;
            overflow-x: auto;
            margin-bottom: 0.5em;
        }
        .prose code {
            font-family: monospace;
            background-color: #374151;
            padding: 0.2em 0.4em;
            border-radius: 0.3em;
        }
        .prose pre code {
            background-color: transparent;
            padding: 0;
        }
        .prose a {
            color: #2563eb;
            text-decoration: underline;
        }
        .prose blockquote {
            border-left: 4px solid rgba(15, 23, 42, 0.12);
            padding-left: 1em;
            color: #64748b;
            font-style: italic;
        }
        .typing-dot {
            animation: typing 1.4s infinite ease-in-out both;
        }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .apple-shell {
            background: rgba(255, 255, 255, 0.72);
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow:
                0 20px 60px rgba(15, 23, 42, 0.08),
                inset 0 1px 0 rgba(255, 255, 255, 0.85);
        }
        .apple-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: 0 12px 40px rgba(15, 23, 42, 0.06);
        }
        .apple-divider {
            border-color: rgba(15, 23, 42, 0.08);
        }
        .message-card {
            border-radius: 24px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: 0 12px 30px rgba(15, 23, 42, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .message-card-ai {
            background: rgba(255, 255, 255, 0.82);
        }
        .message-card-user {
            background: linear-gradient(135deg, rgba(17, 24, 39, 0.96), rgba(51, 65, 85, 0.92));
            color: #f8fafc;
        }
        .starter-btn {
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(15, 23, 42, 0.08);
            color: #334155;
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.04);
        }
        .starter-btn:hover {
            background: rgba(255, 255, 255, 0.94);
            border-color: rgba(59, 130, 246, 0.22);
            color: #0f172a;
        }
        .soft-badge {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(15, 23, 42, 0.06);
            color: #64748b;
        }
        .action-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.45rem 0.9rem;
            border-radius: 9999px;
            font-size: 11px;
            line-height: 1;
            font-weight: 600;
            border: 1px solid transparent;
            transition: all 180ms ease;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .action-chip:hover {
            transform: translateY(-1px);
        }
        .action-chip-primary {
            background: rgba(37, 99, 235, 0.08);
            border-color: rgba(37, 99, 235, 0.12);
            color: #1d4ed8;
        }
        .action-chip-primary:hover {
            background: rgba(37, 99, 235, 0.14);
        }
        .action-chip-secondary {
            background: rgba(15, 23, 42, 0.05);
            border-color: rgba(15, 23, 42, 0.07);
            color: #334155;
        }
        .action-chip-secondary:hover {
            background: rgba(15, 23, 42, 0.09);
        }
        .action-chip-emerald {
            background: rgba(5, 150, 105, 0.08);
            border-color: rgba(5, 150, 105, 0.12);
            color: #047857;
        }
        .action-chip-emerald:hover {
            background: rgba(5, 150, 105, 0.14);
        }
        .action-chip-amber {
            background: rgba(217, 119, 6, 0.09);
            border-color: rgba(217, 119, 6, 0.12);
            color: #b45309;
        }
        .action-chip-amber:hover {
            background: rgba(217, 119, 6, 0.14);
        }
        .action-chip-rose {
            background: rgba(225, 29, 72, 0.08);
            border-color: rgba(225, 29, 72, 0.12);
            color: #be123c;
        }
        .action-chip-rose:hover {
            background: rgba(225, 29, 72, 0.14);
        }
        .welcome-surface {
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.82), rgba(255, 255, 255, 0.66)),
                radial-gradient(circle at top right, rgba(191, 219, 254, 0.45), transparent 28%);
        }
        .mini-panel {
            border-radius: 22px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            background: rgba(255, 255, 255, 0.58);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.82);
        }
        .chart-surface {
            border-radius: 28px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            background: rgba(255, 255, 255, 0.86);
            box-shadow: 0 18px 50px rgba(15, 23, 42, 0.07);
            overflow: hidden;
        }
        .chart-meta {
            color: #64748b;
            letter-spacing: 0.01em;
        }
    </style>
</head>
<body class="antialiased h-screen flex overflow-hidden p-4 md:p-5">

    <div class="apple-shell w-full flex overflow-hidden rounded-[32px]">
    <div class="w-16 md:w-72 border-r apple-divider flex flex-col bg-white/22">
        <div class="p-4 border-b apple-divider flex items-center justify-center md:justify-start">
            <a href="/" class="text-lg font-semibold tracking-tight text-slate-900">Chanlun<span class="hidden md:inline text-slate-400 text-sm ml-2 font-medium">Chat</span></a>
        </div>
        <div class="flex-1 overflow-y-auto p-2">
            <button id="new-chat-btn" class="w-full bg-slate-900 hover:bg-slate-800 text-white py-2.5 px-4 rounded-2xl mb-4 flex items-center justify-center transition-colors shadow-lg shadow-slate-900/10">
                <svg class="w-5 h-5 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                <span class="hidden md:inline">New Chat</span>
            </button>
            <button id="delete-current-session-btn" class="w-full border border-rose-200/80 text-rose-500 hover:bg-rose-50 py-2.5 px-4 rounded-2xl mb-4 flex items-center justify-center transition-colors disabled:opacity-40 disabled:cursor-not-allowed">
                <svg class="w-5 h-5 md:mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3m-7 0h8"></path></svg>
                <span class="hidden md:inline">Delete Chat</span>
            </button>
            
            <div class="text-[11px] text-slate-400 uppercase font-semibold mb-2 px-2 hidden md:block tracking-[0.22em]">Recent</div>
            <div id="session-list" class="space-y-1">
                <div class="p-2 rounded-2xl text-sm text-slate-400 hidden md:block">
                    暂无会话
                </div>
            </div>
        </div>
        <div class="p-4 border-t apple-divider">
            <div class="flex items-center">
                <div class="w-8 h-8 rounded-full bg-slate-900 text-white flex items-center justify-center text-xs shadow-sm">U</div>
                <div class="ml-2 hidden md:block">
                    <div class="text-sm font-medium text-slate-900">User</div>
                    <div class="text-xs text-slate-400">Workspace</div>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 flex flex-col min-w-0 bg-transparent">
        <div class="border-b apple-divider bg-white/28 backdrop-blur-xl">
            <div class="max-w-5xl mx-auto px-6 py-5 flex items-center justify-between gap-4">
                <div>
                    <h2 class="text-2xl md:text-[30px] font-semibold tracking-tight text-slate-950">Chanlun</h2>
                </div>
                <div class="hidden xl:flex items-center gap-2 text-xs">
                    <span class="soft-badge px-3 py-1.5 rounded-full">Charts</span>
                    <span class="soft-badge px-3 py-1.5 rounded-full">News</span>
                    <span class="soft-badge px-3 py-1.5 rounded-full">Research</span>
                </div>
            </div>
        </div>

        <div id="messages" class="flex-1 overflow-y-auto p-4 md:p-6 space-y-6"></div>

        <div class="p-4 bg-transparent border-t apple-divider">
            <div class="max-w-5xl mx-auto">
                <div class="flex flex-wrap items-center gap-2 mb-3" id="starter-prompts">
                    <button type="button" class="starter-btn px-3.5 py-2 rounded-full text-sm transition-colors" data-starter-prompt="看 AUDUSD 价格图">价格图</button>
                    <button type="button" class="starter-btn px-3.5 py-2 rounded-full text-sm transition-colors" data-starter-prompt="黄金今天有什么重要新闻">新闻</button>
                    <button type="button" class="starter-btn px-3.5 py-2 rounded-full text-sm transition-colors" data-starter-prompt="给我一份 AUDUSD 的研究报告">研究</button>
                    <button type="button" class="starter-btn px-3.5 py-2 rounded-full text-sm transition-colors" data-starter-prompt="点击交易 AUDUSD">交易</button>
                </div>
                <div class="apple-panel rounded-[28px]">
                    <div class="flex items-center justify-between px-5 pt-4 pb-2">
                        <div>
                            <div class="text-sm text-slate-900 font-medium">今天想看什么</div>
                            <div class="text-xs text-slate-400 mt-1">输入一个标的或直接说需求</div>
                        </div>
                        <div class="flex items-center gap-2">
                            <input id="attachment-input" type="file" class="hidden" />
                            <button id="upload-btn" class="text-xs px-3 py-1.5 rounded-full border border-slate-200 text-slate-500 hover:bg-white transition-colors">上传附件</button>
                        </div>
                    </div>
                    <div class="px-5 pb-5 relative">
                        <textarea id="user-input" rows="1" class="w-full bg-transparent text-slate-900 border-0 px-0 py-3 pr-16 focus:outline-none resize-none overflow-hidden placeholder:text-slate-400" placeholder="例如：usdcny 价格图 / 苹果最新新闻 / 给我一份黄金研究" style="min-height: 72px; max-height: 220px;"></textarea>
                        <button id="send-btn" class="absolute right-1 bottom-5 p-3 bg-slate-900 text-white rounded-2xl hover:bg-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-lg shadow-slate-900/10">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="text-center text-xs text-slate-400 mt-3">请在交易前自行确认价格、风险与仓位。</div>
            </div>
        </div>
    </div>
    </div>

    <div class="hidden">
        <input id="context-market" />
        <input id="context-code" />
        <input id="context-theme" />
        <select id="context-skill">
            <option value="">自动匹配技能</option>
        </select>
        <select id="context-frequency">
            <option value="5m">5m</option>
            <option value="15m">15m</option>
            <option value="30m" selected>30m</option>
            <option value="1h">1h</option>
            <option value="4h">4h</option>
            <option value="1d">1d</option>
        </select>
        <div id="attachment-list"></div>
        <select id="memory-target">
            <option value="memory">MEMORY</option>
            <option value="user">USER</option>
        </select>
        <input id="memory-input" />
        <button id="save-memory-btn" type="button"></button>
        <button id="refresh-memories-btn" type="button"></button>
        <div id="memory-list"></div>
        <input id="skill-name-input" />
        <textarea id="skill-description-input"></textarea>
        <button id="create-skill-btn" type="button"></button>
        <button id="refresh-skills-btn" type="button"></button>
        <div id="skill-list"></div>
        <div id="context-panel"></div>
        <div id="context-empty"></div>
    </div>

    <div id="chart-viewer-modal" class="fixed inset-0 z-50 hidden bg-black/70 backdrop-blur-sm">
        <div class="absolute inset-0 flex items-center justify-center p-4">
            <div class="w-full max-w-7xl h-[88vh] bg-gray-950 border border-gray-800 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
                <div class="flex items-center justify-between px-4 py-3 border-b border-gray-800">
                    <div>
                        <div id="chart-viewer-title" class="text-sm font-medium text-gray-100">价格图形</div>
                        <div id="chart-viewer-meta" class="text-xs text-gray-500 mt-1"></div>
                    </div>
                    <div class="flex items-center gap-2">
                        <button id="chart-viewer-home-btn" class="text-xs px-3 py-1.5 rounded border border-blue-900 text-blue-300 hover:bg-blue-950">主页图形</button>
                        <button id="chart-viewer-db-btn" class="text-xs px-3 py-1.5 rounded border border-emerald-900 text-emerald-300 hover:bg-emerald-950">数据库图形</button>
                        <button id="chart-viewer-close-btn" class="text-xs px-3 py-1.5 rounded border border-gray-700 text-gray-300 hover:bg-gray-800">关闭</button>
                    </div>
                </div>
                <iframe id="chart-viewer-frame" class="w-full flex-1 bg-white" style="border:0;"></iframe>
            </div>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const contextMarketInput = document.getElementById('context-market');
        const contextCodeInput = document.getElementById('context-code');
        const contextThemeInput = document.getElementById('context-theme');
        const contextSkillSelect = document.getElementById('context-skill');
        const contextFrequencySelect = document.getElementById('context-frequency');
        const uploadBtn = document.getElementById('upload-btn');
        const attachmentInput = document.getElementById('attachment-input');
        const attachmentListDiv = document.getElementById('attachment-list');
        const memoryTargetSelect = document.getElementById('memory-target');
        const memoryInput = document.getElementById('memory-input');
        const saveMemoryBtn = document.getElementById('save-memory-btn');
        const refreshMemoriesBtn = document.getElementById('refresh-memories-btn');
        const memoryListDiv = document.getElementById('memory-list');
        const skillNameInput = document.getElementById('skill-name-input');
        const skillDescriptionInput = document.getElementById('skill-description-input');
        const createSkillBtn = document.getElementById('create-skill-btn');
        const refreshSkillsBtn = document.getElementById('refresh-skills-btn');
        const skillListDiv = document.getElementById('skill-list');
        const starterPrompts = document.getElementById('starter-prompts');
        const newChatBtn = document.getElementById('new-chat-btn');
        const deleteCurrentSessionBtn = document.getElementById('delete-current-session-btn');
        const sessionListDiv = document.getElementById('session-list');
        const contextPanel = document.getElementById('context-panel');
        const contextEmpty = document.getElementById('context-empty');
        const chartViewerModal = document.getElementById('chart-viewer-modal');
        const chartViewerFrame = document.getElementById('chart-viewer-frame');
        const chartViewerTitle = document.getElementById('chart-viewer-title');
        const chartViewerMeta = document.getElementById('chart-viewer-meta');
        const chartViewerHomeBtn = document.getElementById('chart-viewer-home-btn');
        const chartViewerDbBtn = document.getElementById('chart-viewer-db-btn');
        const chartViewerCloseBtn = document.getElementById('chart-viewer-close-btn');

        let currentSessionId = null;
        let currentContext = {};
        let isGenerating = false;
        let currentChartViewerPayload = null;

        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);
        uploadBtn.addEventListener('click', async () => {
            if (!currentSessionId) {
                await createSessionAndLoad();
            }
            attachmentInput.click();
        });
        attachmentInput.addEventListener('change', uploadAttachment);
        saveMemoryBtn.addEventListener('click', saveMemory);
        refreshMemoriesBtn.addEventListener('click', loadMemories);
        createSkillBtn.addEventListener('click', createSkill);
        refreshSkillsBtn.addEventListener('click', loadSkills);
        starterPrompts?.addEventListener('click', (event) => {
            const button = event.target.closest('[data-starter-prompt]');
            if (!button) return;
            userInput.value = button.dataset.starterPrompt || '';
            userInput.dispatchEvent(new Event('input'));
            userInput.focus();
        });
        newChatBtn.addEventListener('click', async () => {
            await createSessionAndLoad();
        });
        deleteCurrentSessionBtn?.addEventListener('click', async () => {
            if (!currentSessionId) return;
            await deleteSession(currentSessionId);
        });
        chartViewerCloseBtn.addEventListener('click', closeChartViewer);
        chartViewerModal.addEventListener('click', function(e) {
            if (e.target === chartViewerModal) {
                closeChartViewer();
            }
        });
        chartViewerHomeBtn.addEventListener('click', () => {
            if (currentChartViewerPayload) {
                openChartViewer(currentChartViewerPayload, 'home');
            }
        });
        chartViewerDbBtn.addEventListener('click', () => {
            if (currentChartViewerPayload) {
                openChartViewer(currentChartViewerPayload, 'db');
            }
        });

        async function bootstrapChat() {
            await loadSessions();
            await loadMemories();
            await loadSkills();
            if (!currentSessionId) {
                await createSessionAndLoad();
            }
        }

        async function loadSessions() {
            const response = await fetch('/api/ai/chat/sessions');
            const payload = await response.json();
            const sessions = (((payload || {}).data || {}).sessions || []);
            renderSessionList(sessions);
            updateDeleteSessionButtonState();
            if (!currentSessionId && sessions.length) {
                await loadSession(sessions[0].id);
            }
        }

        async function createSessionAndLoad() {
            clearMessages();
            clearCitations();
            const response = await fetch('/api/ai/chat/sessions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ context: currentContext || {} })
            });
            const payload = await response.json();
            const session = (((payload || {}).data || {}).session || null);
            if (!session) {
                throw new Error('创建会话失败');
            }
            currentSessionId = session.id;
            currentContext = session.context || {};
            syncContextInputs();
            updateDeleteSessionButtonState();
            renderWelcome();
            renderAttachments([]);
            await loadMemories();
            await loadSkills();
            await loadSessions();
        }

        async function loadSession(sessionId) {
            const response = await fetch(`/api/ai/chat/sessions/${sessionId}`);
            const payload = await response.json();
            const session = (((payload || {}).data || {}).session || null);
            const messages = (((payload || {}).data || {}).messages || []);
            const attachments = (((payload || {}).data || {}).attachments || []);
            currentSessionId = sessionId;
            currentContext = (session && session.context) || {};
            syncContextInputs();
            renderSessionListSelection(sessionId);
            updateDeleteSessionButtonState();
            renderHistoryMessages(messages);
            renderAttachments(attachments);
            await loadMemories();
            await loadSkills();
        }

        function updateDeleteSessionButtonState() {
            if (!deleteCurrentSessionBtn) return;
            deleteCurrentSessionBtn.disabled = !currentSessionId;
        }

        async function deleteSession(sessionId) {
            if (!sessionId) return;
            const confirmed = window.confirm('删除后将移除该会话的消息与附件，确定继续吗？');
            if (!confirmed) return;
            const row = sessionListDiv.querySelector(`[data-session-row="${sessionId}"]`);
            if (row) row.classList.add('opacity-50');
            const response = await fetch(`/api/ai/chat/sessions/${sessionId}`, {
                method: 'DELETE',
                headers: { 'Accept': 'application/json' }
            });
            let payload = {};
            try {
                payload = await response.json();
            } catch (error) {
                payload = { code: 500, msg: '删除响应解析失败' };
            }
            if (!response.ok || payload.code !== 0) {
                if (row) row.classList.remove('opacity-50');
                alert(payload.msg || '删除会话失败');
                return;
            }
            row?.remove();
            if (currentSessionId === sessionId) {
                currentSessionId = '';
                currentContext = {};
                syncContextInputs();
                clearMessages();
                clearCitations();
                renderWelcome();
                renderAttachments([]);
                updateDeleteSessionButtonState();
            }
            await loadSessions();
            const sessionButtons = Array.from(sessionListDiv.querySelectorAll('[data-session-id]'));
            if (!currentSessionId && sessionButtons.length) {
                await loadSession(sessionButtons[0].dataset.sessionId);
                return;
            }
            if (!sessionButtons.length) {
                renderSessionList([]);
            }
        }

        function renderSessionList(sessions) {
            if (!sessions.length) {
                sessionListDiv.innerHTML = `
                    <div class="p-2 rounded text-sm text-gray-500 hidden md:block">暂无会话</div>
                `;
                return;
            }
            sessionListDiv.innerHTML = sessions.map(session => `
                <div class="group hidden md:flex items-center gap-2" data-session-row="${session.id}">
                    <button
                        class="flex-1 text-left p-2 rounded text-sm truncate transition-colors ${session.id === currentSessionId ? 'bg-gray-800 text-gray-100' : 'text-gray-400 hover:bg-gray-800'}"
                        data-session-id="${session.id}"
                        title="${escapeHtml(session.title || '新会话')}"
                    >

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text || isGenerating) return;
            if (!currentSessionId) {
                await createSessionAndLoad();
            }

            userInput.value = '';
            userInput.style.height = 'auto';
            isGenerating = true;
            sendBtn.disabled = true;

            addMessage('user', text);
            const aiMsgId = addMessage('ai', '', true);

            try {
                currentContext = inferContextFromMessage(text, {
                    market: contextMarketInput.value.trim(),
                    code: contextCodeInput.value.trim(),
                    theme: contextThemeInput.value.trim(),
                    skill_name: contextSkillSelect.value || '',
                    frequency: contextFrequencySelect.value || '30m'
                });
                syncContextInputs();
                renderOptimisticInlineChart(text, currentContext);
                renderOptimisticTradeCard(text, currentContext);
                const response = await fetch(`/api/ai/chat/sessions/${currentSessionId}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: { type: 'user_text', content: text },
                        context: currentContext,
                        options: { stream: true }
                    })
                });

                if (!response.ok || !response.body) {
                    throw new Error('Network response was not ok');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let aiContent = '';
                const currentAiMsgDiv = document.getElementById(aiMsgId).querySelector('.prose');
                currentAiMsgDiv.innerHTML = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n\n');

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const dataStr = line.slice(6);
                        if (dataStr === '[DONE]') continue;
                        try {
                            const data = JSON.parse(dataStr);
                            if (data.type === 'content') {
                                aiContent += data.content || '';
                                currentAiMsgDiv.innerHTML = marked.parse(aiContent);
                                hljs.highlightAll();
                                scrollToBottom();
                            } else if (data.type === 'chart') {
                                renderChartMessage(data.data || {});
                            } else if (data.type === 'analysis_result') {
                                const analysisMeta = getAnalysisDisplayMeta(data.analysis_type || ((data.data || {}).analysis_type) || 'analysis', (data.data || {}).result || {});
                                currentAiMsgDiv.innerHTML = `<p>${escapeHtml(analysisMeta.chatLine)}</p>`;
                                renderAnalysisResult(data);
                            } else if (data.type === 'citation') {
                                renderCitation(data);
                            } else if (data.type === 'error') {
                                currentAiMsgDiv.innerHTML += `<br><span class="text-red-500 text-sm">[Error: ${escapeHtml(data.content || 'Unknown error')}]</span>`;
                            }
                        } catch (error) {
                            console.error('Error parsing SSE data', error);
                        }
                    }
                }

                await loadSessions();
                renderSessionListSelection(currentSessionId);
                await loadSkills();
            } catch (error) {
                console.error('Fetch error:', error);
                const currentAiMsgDiv = document.getElementById(aiMsgId).querySelector('.prose');
                currentAiMsgDiv.innerHTML += `<br><span class="text-red-500">Connection failed. Please try again.</span>`;
            } finally {
                isGenerating = false;
                sendBtn.disabled = false;
                scrollToBottom();
            }
        }

        function inferContextFromMessage(text, context = {}) {
            const resolved = { ...(context || {}) };
            const content = String(text || '').trim();
            if (!content) return resolved;

            const explicitMatch = content.match(/\b(a|hk|us|fx|futures|ny_futures|currency|currency_spot)\s*[:：]\s*([a-zA-Z0-9._-]+)/i);
            if (explicitMatch) {
                resolved.market = explicitMatch[1].toLowerCase();
                resolved.code = explicitMatch[2].toUpperCase();
                return resolved;
            }

            const compact = content.replace(/\s+/g, '');
            const slashFxMatch = compact.match(/\b([A-Za-z]{3})\/([A-Za-z]{3})\b/);
            if (slashFxMatch) {
                resolved.market = 'fx';
                resolved.code = `${slashFxMatch[1]}${slashFxMatch[2]}`.toUpperCase();
                return resolved;
            }

            const currencyCodes = new Set(['AUD', 'USD', 'EUR', 'GBP', 'JPY', 'CHF', 'CAD', 'NZD', 'CNH', 'CNY', 'HKD', 'SGD']);
            const fxPairMatch = content.toUpperCase().match(/\b([A-Z]{6})\b/);
            if (fxPairMatch) {
                const pair = fxPairMatch[1];
                if (currencyCodes.has(pair.slice(0, 3)) && currencyCodes.has(pair.slice(3))) {
                    resolved.market = 'fx';
                    resolved.code = pair;
                    return resolved;
                }
            }

            const aShareMatch = content.match(/\b(?:SH|SZ)?\.?(\d{6})\b/i);
            if (aShareMatch) {
                resolved.market = 'a';
                resolved.code = aShareMatch[1];
            }

            return resolved;
        }

            const url = source === 'db' ? chart.db_chart_url : chart.homepage_url;
            chartViewerTitle.textContent = chart.title || `${chart.code} 价格图形`;
            chartViewerMeta.textContent = `${chart.market || ''} / ${chart.code || ''} / ${chart.frequency || ''}`;
            chartViewerFrame.src = url || '';
            chartViewerModal.classList.remove('hidden');
        }

        function closeChartViewer() {
            chartViewerModal.classList.add('hidden');
            chartViewerFrame.src = 'about:blank';
            currentChartViewerPayload = null;
        }

        function escapeHtml(text) {
            return String(text || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        bootstrapChat().catch(error => {
            console.error('Bootstrap chat failed', error);
            renderWelcome();
        });
    </script>
</body>
</html>
