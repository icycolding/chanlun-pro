<html lang="zh">

      href="{{ url_for('static', filename='favicon.ico') }}" />
    <link

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/app.css') }}" />

    <script
      type="text/javascript"
      src="{{ url_for('static', filename='jquery-3.7.0.min.js') }}"></script>
    <script

      src="{{ url_for('static', filename='layui.js') }}"></script>
    <script

      src="{{ url_for('static', filename='xm-select.js') }}"></script>
    <script

    <style>
      body.home-page {
        background: #eef2f7;
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        overflow-y: auto;
      }

      .home-shell {
        background:
          radial-gradient(circle at top left, rgba(255, 87, 34, 0.08), transparent 24%),
          linear-gradient(180deg, #f8fafc 0%, #eef2f7 100%);
        min-height: 100vh;
      }

      .home-main-row {
        height: 100vh;
        min-height: 780px;
      }

      .home-chart {
        width: calc(100% - 336px);
        padding: 12px 0 0 12px;
        box-sizing: border-box;
      }

      .home-chart #tv_charts_area {
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.84);
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      }

      .home-sidebar {
        width: 336px;
        background: rgba(248, 250, 252, 0.96);
        border-left: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: -12px 0 30px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(14px);
        scrollbar-gutter: stable;
      }

      .sidebar-header {
        padding: 16px 16px 12px;
        position: sticky;
        top: 0;
        z-index: 30;
        background: linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(248, 250, 252, 0.9));
        border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      }

      .sidebar-header-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .sidebar-title {
        margin: 0;
        font-size: 24px;
        font-weight: 700;
        color: #111827;
      }

      .sidebar-toggle {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.95);
        border: 1px solid rgba(15, 23, 42, 0.08);
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.06);
      }

      .sidebar-filter-form {
        margin-top: 14px;
      }

      .sidebar-quick-links {
        display: flex;
        gap: 8px;
        margin-top: 12px;
        flex-wrap: wrap;
      }

      .sidebar-quick-link {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 0 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, #0f172a, #2563eb);
        color: #fff;
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        box-shadow: 0 10px 24px rgba(37, 99, 235, 0.22);
      }

      .sidebar-quick-link:hover {
        color: #fff;
        opacity: 0.96;
      }

      .sidebar-sections {
        margin: 0 12px 12px;
        border: none;
        background: transparent;
      }

      .sidebar-sections .layui-colla-item {
        margin-bottom: 12px;
        border: none;
        border-radius: 18px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      }

      .sidebar-sections .layui-colla-title {
        height: auto;
        line-height: 1.5;
        padding: 15px 16px;
        font-size: 14px;
        font-weight: 700;
        color: #111827;
        background: linear-gradient(180deg, rgba(248, 250, 252, 0.98), rgba(241, 245, 249, 0.95));
        border-bottom: 1px solid rgba(15, 23, 42, 0.06);
      }

      .sidebar-sections .layui-colla-content {
        padding: 14px !important;
      }

      .home-toolbar {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      .home-toolbar .layui-input-inline,
      .home-toolbar .layui-form-mid {
        float: none !important;
        margin: 0 !important;
      }

      .home-toolbar .layui-input-inline {
        width: 100% !important;
        flex: 1 1 170px;
      }

      .home-chip-btn {
        height: 32px;
        line-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        box-shadow: 0 6px 16px rgba(15, 23, 42, 0.05);
      }

      .home-table-wrap {
        overflow-y: auto;
        height: calc(100% - 74px);
        margin-top: 10px;
        border-radius: 14px;
        background: #f8fafc;
        border: 1px solid rgba(15, 23, 42, 0.06);
      }

      .home-news-row {
        min-height: 72vh;
        background: transparent !important;
        border-top: none !important;
        padding: 12px 12px 14px;
        box-sizing: border-box;
      }

      .home-news-column {
        height: auto;
        width: calc(100% - 336px);
      }

      .home-news-board {
        min-height: 72vh;
        height: auto;
        display: flex;
        flex-direction: column;
        padding: 16px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.94);
        border: 1px solid rgba(15, 23, 42, 0.06);
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      }

      body.embedded-mode,
      body.embedded-mode .home-shell {
        min-height: 100vh;
        height: 100vh;
        overflow: hidden;
        background: #ffffff;
      }

      body.embedded-mode .home-chart {
        width: 100% !important;
        padding: 0 !important;
      }

      body.embedded-mode .home-sidebar,
      body.embedded-mode .home-news-row {
        display: none !important;
      }

      body.embedded-mode .home-main-row {
        height: 100vh !important;
        min-height: 100vh !important;
      }

      body.embedded-mode .home-chart #tv_charts_area {
        border-radius: 0 !important;
        box-shadow: none !important;
      }

      .news-toolbar {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 16px;
        flex-wrap: wrap;
        margin-bottom: 14px;
      }

      .news-toolbar-title {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .news-toolbar-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .news-action-btn {
        height: 34px;
        line-height: 34px;
        padding: 0 14px;
        border-radius: 12px;
        box-shadow: 0 8px 18px rgba(15, 23, 42, 0.05);
      }

      .news-status-panel {
        margin-bottom: 14px !important;
        padding: 12px 14px !important;
        border-radius: 16px !important;
        background: linear-gradient(180deg, rgba(248, 250, 252, 0.9), rgba(241, 245, 249, 0.95)) !important;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.65) !important;
      }

      .focus-panel {
        margin-bottom: 14px;
        padding: 16px;
        border-radius: 16px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.96));
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
      }

      .focus-panel.focus-panel-urgent {
        border-color: rgba(220, 38, 38, 0.34);
        box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.10), 0 16px 36px rgba(220, 38, 38, 0.16);
        animation: focus-urgent-pulse 1.2s ease-in-out 3;
      }

      @keyframes focus-urgent-pulse {
        0% {
          transform: translateY(0);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.08), 0 10px 24px rgba(15, 23, 42, 0.05);
        }
        50% {
          transform: translateY(-2px);
          box-shadow: 0 0 0 8px rgba(239, 68, 68, 0.10), 0 18px 36px rgba(220, 38, 38, 0.18);
        }
        100% {
          transform: translateY(0);
          box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.08), 0 10px 24px rgba(15, 23, 42, 0.05);
        }
      }

      .focus-panel-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
        gap: 14px;
      }

      .focus-summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin-top: 12px;
      }

      .focus-metric-card {
        padding: 12px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      .focus-event-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .focus-event-item {
        padding: 12px 14px;
        border-radius: 12px;
        background: #fff;
        border: 1px solid rgba(15, 23, 42, 0.08);
      }

      .focus-driver-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-top: 12px;
      }

      .focus-driver-item {
        padding: 10px 12px;
        border-radius: 12px;
        background: rgba(248, 250, 252, 0.85);
        border: 1px solid rgba(15, 23, 42, 0.06);
      }

      .news-feed {
        flex: none;
        min-height: 58vh;
        overflow: visible;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.98), rgba(248, 250, 252, 0.94)) !important;
        border: 1px solid rgba(15, 23, 42, 0.06) !important;
        border-radius: 16px !important;
        padding: 18px !important;
      }

      .news-feed-empty {
        text-align: center;
        color: #6b7280 !important;
        padding: 32px 20px !important;
      }

      @media (max-width: 1200px) {
        .home-chart,
        .home-news-column {
          width: calc(100% - 300px);
        }

        .home-sidebar {
          width: 300px;
        }
      }

      @media (max-width: 900px) {
        .home-main-row {
          height: auto;
          min-height: 62vh;
        }

        .home-chart,
        .home-news-column {
          width: 100%;
          padding-right: 0;
        }

        .home-sidebar {
          position: relative !important;
          width: 100%;
          max-height: 48vh;
          box-shadow: none;
          border-left: none;
          border-top: 1px solid rgba(15, 23, 42, 0.08);
        }

        .home-chart {
          padding-right: 12px;
        }

        .home-news-row,
        .home-news-board {
          min-height: 56vh;
        }

        .news-feed {
          min-height: 48vh;
        }

        .focus-panel-grid,
        .focus-summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
    {% include 'dark.html' %}
  </head>

  <body class="home-page">

    var chart_widgets = [];

    // 变更图表展示的标的
    function change_chart_ticker(_market, _code, _label) {
      var market = _market;
      var code = _code;
      var label = _label;
      console.log('code',code)
      Utils.set_local_data("market", market);
      Utils.set_local_data(market + "_code", code);
      Utils.set_local_data(market + "_label", label || code);
      layui.each(chart_widgets, function (i, w) {
        w.activeChart().setSymbol(market + ":" + code);
      });
      ZiXuan.render_zixuan_opts();
      
      // 根据股票代码搜索相关新闻
      search_news_by_code(market, code);
      if (window.News && typeof window.News.clear_timesfm_chart_overlay === "function") {
        window.News.clear_timesfm_chart_overlay();
      }
    }

    function get_market_display_name(market) {
      var marketNames = {
        a: '沪深A股',
        hk: '港股',
        futures: '国内期货',
        ny_futures: '纽约期货',
        fx: '外汇',
        us: '美股',
        currency: '数字货币(合约)',
        currency_spot: '数字货币(现货)'
      };
      return marketNames[market] || market || '未知市场';
    }

    function get_current_asset_label(market, code) {
      var storedLabel = Utils.get_local_data(market + "_label");
      if (storedLabel && storedLabel !== code) {
        return storedLabel;
      }

      try {
        var storedItems = JSON.parse(localStorage.getItem(market + "_selectedItems")) || [];
        for (var i = 0; i < storedItems.length; i++) {
          if (storedItems[i] && storedItems[i].value === code) {
            return storedItems[i].name || code;
          }
        }
      } catch (e) {
      }

      return code;
    }
    
    // 根据股票代码搜索相关新闻
    function search_news_by_code(market, code) {
      // 构建搜索查询，包含股票代码和市场信息
      var searchQuery = code;
      // if (market === 'a') {
      //   searchQuery += ' 股票 A股';
      // } else if (market === 'hk') {
      //   searchQuery += ' 港股 香港';
      // } else if (market === 'us') {
      //   searchQuery += ' 美股 美国';
      // } else if (market === 'currency') {
      //   searchQuery += ' 外汇 汇率';
      // } else if (market === 'futures') {
      //   searchQuery += ' 期货';
      // }
      searchQuery = {'query': code, 'market': market}


      console.log('搜索相关新闻:', searchQuery);
      
      // 发送语义搜索请求
      $.ajax({
        url: '/api/news/semantic_search',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
          query: searchQuery,
          n_results: 50,
          filters: {
            market_relevance: {"$gte": 0.3}  // 只显示市场相关度较高的新闻
          }
        }),
        success: function(response) {
           console.log('新闻搜索结果:', response);
           if (response.code === 0 && response.data && response.data.results && response.data.results.length > 0) {
             // 转换搜索结果格式以匹配render_news_list期望的数据结构
             var formattedNews = response.data.results.map(function(item) {
               var metadata = item.metadata || {};
               return {
                 news_id: metadata.news_id || item.id,
                 title: metadata.title || '无标题',
                 published_at: metadata.published_at || metadata.timestamp,
                 source: metadata.source || '未知来源',
                 body: item.document || metadata.body || ''
               };
             });
             
             // 渲染搜索到的新闻
             News.render_news_list(formattedNews);
             // 更新新闻区域标题，显示当前搜索的股票
             $('#news_section_title').text('新闻资讯 - ' + code + ' 相关');
           } else {
             console.log('未找到相关新闻，加载默认新闻');
             // 如果没有找到相关新闻，加载默认新闻
             News.load_news();
             $('#news_section_title').text('新闻资讯');
           }
         },
        error: function(xhr, status, error) {
          console.error('搜索新闻失败:', error);
          // 搜索失败时加载默认新闻
          News.load_news();
          $('#news_section_title').text('新闻资讯');
        }
      });
    }
  </script>

        charts_area.empty();
        let win_height = $("#chart_container").height() || window.innerHeight;
        let win_width = charts_area.width() || window.innerWidth;
        let chart_configs = [];
        if (chart_layout_type === "single") {
          chart_configs = [{ id: "1", style: "flex:1;" }];
          charts_area.css({ display: "flex", flexDirection: "column" });
        } else if (chart_layout_type === "vertical-2") {
          chart_configs = [
            { id: "1", style: "flex:1;" },
            { id: "2", style: "flex:1;" },
          ];
          charts_area.css({ display: "flex", flexDirection: "row" });
        } else if (chart_layout_type === "horizontal-2") {
          chart_configs = [
            { id: "1", style: "flex:1;" },
            { id: "2", style: "flex:1;" },
          ];
          charts_area.css({ display: "flex", flexDirection: "column" });
        } else if (chart_layout_type === "three") {
          chart_configs = [{ id: "1" }, { id: "2" }, { id: "3" }];
          charts_area.css({ display: "flex", flexDirection: "column" });
        } else if (chart_layout_type === "horizontal-7-3") {
          chart_configs = [{ id: "1" }, { id: "2" }];
          charts_area.css({ display: "flex", flexDirection: "column" });
        } else if (chart_layout_type === "four") {
          chart_configs = [
            { id: "1", style: "width:50%;height:50%;float:left;" },
            { id: "2", style: "width:50%;height:50%;float:left;" },
            { id: "3", style: "width:50%;height:50%;float:left;" },
            { id: "4", style: "width:50%;height:50%;float:left;" },
          ];
          charts_area.css({
            display: "flex",
            flexDirection: "row",
            flexWrap: "wrap",
          });
        }

        chart_widgets = [];
        if (chart_layout_type === "horizontal-7-3") {
          charts_area.append(
            '<div id="tv_chart_container_1" style="width:100%;height:' +
              win_height * 0.7 +
              'px;"></div>'
          );
          charts_area.append(

              win_height * 0.3 +

          );

              win_height / 2 +

                  var keywords = $.trim(row.find('.historical-topic-keywords').val() || '');

                  topics.push({

                    label: label,

        var observed = chartData.observed || [];
        var forecastPrimary = chartData.forecast_primary || chartData.forecast_30m || [];
        var forecastSecondary = chartData.forecast_secondary || chartData.forecast_120m || [];
        var bandPrimary = chartData.forecast_primary_band || {};
        var bandSecondary = chartData.forecast_secondary_band || {};
        var frequencyLabel = chartData.frequency_label || chartData.frequency || '--';
        var width = 400;
        var height = 170;
        var padding = { top: 16, right: 16, bottom: 28, left: 16 };
        var values = [];

        if (!overlayHost || overlayTarget === 'off' || !observed.length) {
          this.clear_timesfm_chart_overlay();
          return;
        }

        function appendValues(points) {
          (points || []).forEach(function(point) {
            values.push(Number(point.price || 0));
          });
        }

        appendValues(observed);
        if (overlayTarget === 'all' || overlayTarget === 'primary') {
          appendValues(forecastPrimary);
        }
        if (overlayTarget === 'all' || overlayTarget === 'secondary') {
          appendValues(forecastSecondary);
        }

        var minValue = Math.min.apply(null, values);
        var maxValue = Math.max.apply(null, values);
        if (!isFinite(minValue) || !isFinite(maxValue)) {
          overlayHost.empty();
          return;
        }
        if (Math.abs(maxValue - minValue) < 1e-9) {
          maxValue += 1;
          minValue -= 1;
        }

        var maxForecastLength = Math.max(forecastPrimary.length, forecastSecondary.length) - 1;
        var totalSlots = Math.max(observed.length + Math.max(maxForecastLength, 1) - 1, observed.length);

        function xForObserved(index) {
          if (totalSlots <= 1) {
            return padding.left;
          }
          return padding.left + ((width - padding.left - padding.right) * index / (totalSlots - 1));
        }

        function xForForecast(index) {
          return xForObserved((observed.length - 1) + index);
        }

        function yForValue(value) {
          return padding.top + ((maxValue - value) / (maxValue - minValue)) * (height - padding.top - padding.bottom);
        }

        function pointsText(points, type) {
          return (points || []).map(function(point, index) {
            var x = type === 'observed' ? xForObserved(index) : xForForecast(index);
            var y = yForValue(Number(point.price || 0));
            return x.toFixed(1) + ',' + y.toFixed(1);
          }).join(' ');
        }

        function bandPolygon(lowPoints, highPoints) {
          if (!(lowPoints || []).length || !(highPoints || []).length) {
            return '';
          }
          var upper = (highPoints || []).map(function(point, index) {
            return xForForecast(index).toFixed(1) + ',' + yForValue(Number(point.price || 0)).toFixed(1);
          });
          var lower = (lowPoints || []).slice().reverse().map(function(point, reverseIndex) {
            var index = (lowPoints.length - 1) - reverseIndex;
            return xForForecast(index).toFixed(1) + ',' + yForValue(Number(point.price || 0)).toFixed(1);
          });
          return upper.concat(lower).join(' ');
        }

        function targetButton(value, label) {
          var active = overlayTarget === value;
          return '<button type="button" data-forecast-disabled-overlay-target="' + value + '"'
            + ' style="border:none;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;'
            + (active ? 'background:#0f766e;color:#fff;' : 'background:rgba(255,255,255,0.9);color:#0f766e;border:1px solid rgba(15,118,110,0.18);')
            + '">' + label + '</button>';
        }

        var splitX = xForObserved(observed.length - 1);
        var currentPointY = yForValue(Number(observed[observed.length - 1].price || 0));
        var gridLines = '';
        for (var i = 0; i < 3; i++) {
          var gridY = padding.top + ((height - padding.top - padding.bottom) * i / 2);
          gridLines += '<line x1="' + padding.left + '" y1="' + gridY.toFixed(1) + '" x2="' + (width - padding.right) + '" y2="' + gridY.toFixed(1) + '" stroke="rgba(148,163,184,0.16)" stroke-dasharray="3 4"></line>';
        }

        var html = '';
        html += '<div style="backdrop-filter:blur(10px);background:rgba(255,255,255,0.84);border:1px solid rgba(186,230,253,0.95);border-radius:14px;box-shadow:0 10px 24px rgba(15,23,42,0.12);padding:12px 12px 10px;">';
        html += '<div style="display:flex;justify-content:space-between;gap:10px;align-items:flex-start;flex-wrap:wrap;">';
        html += '<div><div style="font-size:12px;font-weight:700;color:#0f766e;">预测模块 主图叠加</div><div style="margin-top:4px;font-size:11px;color:#64748b;">' + frequencyLabel + ' · 当前资产预测路径覆盖</div></div>';
        html += '<div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;">';
        html += targetButton('all', '全部');
        html += targetButton('primary', forecastLabels.primary || '下一周期');
        html += targetButton('secondary', forecastLabels.secondary || '4周期');
        html += targetButton('off', '关闭');
        html += '</div>';
        html += '</div>';
        html += '<svg viewBox="0 0 ' + width + ' ' + height + '" style="width:100%;height:auto;display:block;margin-top:10px;">';
        html += gridLines;
        html += '<line x1="' + splitX.toFixed(1) + '" y1="' + padding.top + '" x2="' + splitX.toFixed(1) + '" y2="' + (height - padding.bottom) + '" stroke="rgba(14,165,233,0.28)" stroke-dasharray="4 4"></line>';
        html += '<polyline fill="none" stroke="#64748b" stroke-width="2.1" points="' + pointsText(observed, 'observed') + '"></polyline>';
        if (overlayTarget === 'all' || overlayTarget === 'primary') {
          if ((bandPrimary.p10 || []).length && (bandPrimary.p90 || []).length) {
            html += '<polygon points="' + bandPolygon(bandPrimary.p10, bandPrimary.p90) + '" fill="rgba(22,163,74,0.12)"></polygon>';
          }
          html += '<polyline fill="none" stroke="#16a34a" stroke-width="' + (overlayTarget === 'primary' ? '3.1' : '2.5') + '" points="' + pointsText(forecastPrimary, 'forecast') + '"></polyline>';
        }
        if (overlayTarget === 'all' || overlayTarget === 'secondary') {
          if ((bandSecondary.p10 || []).length && (bandSecondary.p90 || []).length) {
            html += '<polygon points="' + bandPolygon(bandSecondary.p10, bandSecondary.p90) + '" fill="rgba(37,99,235,0.10)"></polygon>';
          }
          html += '<polyline fill="none" stroke="#2563eb" stroke-width="' + (overlayTarget === 'secondary' ? '3.1' : '2.5') + '" points="' + pointsText(forecastSecondary, 'forecast') + '"></polyline>';
        }
        html += '<circle cx="' + splitX.toFixed(1) + '" cy="' + currentPointY.toFixed(1) + '" r="3.6" fill="#0f766e"></circle>';
        html += '</svg>';
        html += '<div style="display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-top:6px;font-size:11px;color:#475569;">';
        html += '<span>灰色为最近历史价格，彩色线为中位路径，浅色带为 P10-P90 区间</span>';
        html += '<span>点击预测卡片或这里的按钮可切换叠加目标</span>';
        html += '</div>';
        if (backendDetails.native_model || (forecastData || {}).backend) {
          html += '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;">';
          html += '<span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:#ecfeff;color:#155e75;font-size:11px;">后端 ' + ((forecastData || {}).backend || '--') + '</span>';
          if (backendDetails.native_model) {
            html += '<span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:#ecfeff;color:#155e75;font-size:11px;">模型 ' + backendDetails.native_model + '</span>';
          }
          html += '<span style="display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;background:#ecfeff;color:#155e75;font-size:11px;">XReg ' + (backendDetails.xreg_used ? '已启用' : '未启用') + '</span>';
          html += '</div>';
        }
        if (!nativeEnabled && nativeMessage) {
          html += '<div style="margin-top:8px;padding:8px 10px;border-radius:10px;background:#fff1f2;border:1px solid #fecdd3;font-size:11px;line-height:1.7;color:#be123c;">原生模型不可用，预测已停止：' + nativeMessage + '</div>';
        }
        html += '</div>';
        overlayHost.html(html);
      },

      get_jin10_watch_payload: function(scope) {

        var intervalInput = scope && scope.length ? scope.find('.jin10-watch-interval') : $();
        var maxItemsInput = scope && scope.length ? scope.find('.jin10-watch-max-items') : $();
        var interval = parseInt(intervalInput.val(), 10);
        var maxItems = parseInt(maxItemsInput.val(), 10);
        var currentStatus = this.currentJin10WatchStatus || {};

        return {
          interval: isNaN(interval) ? (currentStatus.interval || jin10WatchDefaults.interval || 30) : interval,
          max_items: isNaN(maxItems) ? (currentStatus.max_items || jin10WatchDefaults.max_items || 50) : maxItems
        };
      },

      format_status_time: function(value) {
        if (!value) {
          return '--';
        }
        return String(value).replace('T', ' ').replace('Z', '');
      },

      render_jin10_watch_status: function(data) {
        if (!data) {
          return;
        }
        this.currentJin10WatchStatus = data;

        var running = !!data.running;
        var badge = $('#jin10_watch_badge');
        var statusLine = $('#jin10_watch_status_line');
        var latestSummary = '入库 ' + (data.last_inserted || 0) + ' / 向量 ' + (data.last_vector_synced || 0);
        var scheduleSummary = running
          ? '运行中 · 下次 ' + this.format_status_time(data.next_run_at)
          : '未启动';
        var errorSummary = data.last_error ? ' · 异常' : '';

        badge.text(running ? '金十脚本运行中' : '金十脚本未启动');
        badge.css({
          color: running ? '#166534' : '#8c2f39',
          background: running ? 'rgba(34, 197, 94, 0.14)' : 'rgba(239, 68, 68, 0.12)',
          borderColor: running ? 'rgba(34, 197, 94, 0.22)' : 'rgba(239, 68, 68, 0.18)'
        });

        statusLine.text(scheduleSummary + ' · ' + latestSummary + errorSummary);

        if (this.jin10SettingsLayerIndex !== null) {
          this.sync_jin10_settings_form();
        }
      },

      load_jin10_watch_status: function(silent) {
        var self = this;
        $.ajax({
          url: '/api/news/jin10_watch',
          type: 'GET',
          success: function(response) {
            if (response.code === 0 && response.data) {
              self.render_jin10_watch_status(response.data);
            } else if (!silent) {
              layui.layer.msg(response.msg || '获取金十脚本状态失败');

              layui.layer.msg('获取金十脚本状态失败');
            }
          }
        });
      },

      control_jin10_watch: function(action, scope) {
        var self = this;
        var payload = this.get_jin10_watch_payload(scope);
        payload.action = action;

        var actionTextMap = {
          start: '启动脚本失败',
          stop: '停止脚本失败',
          run_once: '立即同步失败'
        };
        var loadingIndex = layui.layer.load(1, {shade: [0.15, '#000']});

        $.ajax({
          url: '/api/news/jin10_watch',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(payload),
          success: function(response) {
            layui.layer.close(loadingIndex);
            if (response.code === 0) {
              if (response.data) {
                self.render_jin10_watch_status(response.data);
              }
              layui.layer.msg(response.msg || '操作成功');
              setTimeout(function() {
                self.load_news();
                self.load_jin10_watch_status(true);
              }, action === 'stop' ? 300 : 1200);
            } else {
              layui.layer.msg(response.msg || '操作失败');
            }
          },
          error: function() {
            layui.layer.close(loadingIndex);
            layui.layer.msg(actionTextMap[action] || '操作失败');
          }
        });
      },

      // 执行市场总结生成

        var self = this;
        
        // 显示加载提示
        var loadingIndex = layui.layer.load(1, {
          content: '正在从向量数据库搜索相关新闻并生成市场总结，请稍候...',

        if (query) {

        if (productCode) {
          requestData.product_code = productCode;
        }
        
        $.ajax({
          url: '/api/news/market_summary/async',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(requestData),
          timeout: 15000,
          success: function(response) {
            if (response.code === 0 && response.data && response.data.task_id) {
              self.poll_market_summary_task(response.data.task_id, loadingIndex, 0);

      poll_summary_task: function(taskUrl, loadingIndex, attempt, options) {
        var self = this;
        var taskOptions = options || {};
        $.ajax({
          url: taskUrl,
          type: 'GET',
          timeout: 15000,
          success: function(response) {
            if (response.code !== 0 || !response.data) {
              layui.layer.close(loadingIndex);
              layui.layer.msg(response.msg || taskOptions.fetchErrorMessage || '查询任务失败');
              return;
            }

            var task = response.data;
            var progress = task.progress || 0;
            var stageText = task.message || 'AI 正在处理';
            self.update_market_summary_loading(
              loadingIndex,
              stageText + '<br><span style="font-size:12px;color:#999;">进度 ' + progress + '%</span>'
            );

            if (task.state === 'completed' && task.result) {
              layui.layer.close(loadingIndex);
              if (typeof taskOptions.onSuccess === 'function') {
                taskOptions.onSuccess(task.result);
              }
              return;
            }

            if (task.state === 'failed') {
              layui.layer.close(loadingIndex);
              layui.layer.msg((taskOptions.failPrefix || '任务失败') + ': ' + (task.error || task.message || '未知错误'));
              return;
            }

            setTimeout(function() {
              self.poll_summary_task(taskUrl, loadingIndex, (attempt || 0) + 1, taskOptions);
            }, 2000);
          },
          error: function() {
            if ((attempt || 0) >= 5) {
              layui.layer.close(loadingIndex);
              layui.layer.msg(taskOptions.retryErrorMessage || '查询任务进度失败，请稍后查看历史记录');
              return;
            }

            setTimeout(function() {
              self.poll_summary_task(taskUrl, loadingIndex, (attempt || 0) + 1, taskOptions);
            }, 2500);
          }
        });
      },

      poll_market_summary_task: function(taskId, loadingIndex, attempt) {
        var self = this;
        this.poll_summary_task('/api/news/market_summary/task/' + taskId, loadingIndex, attempt, {
          fetchErrorMessage: '查询市场总结任务失败',
          retryErrorMessage: '查询市场总结进度失败，请稍后查看历史记录',
          failPrefix: '生成市场总结失败',
          onSuccess: function(result) {
            self.show_market_summary(result);
          }
        });
      },

      render_timesfm_forecast_block: function(forecastData, options) {

        function modeScoreLabel(value) {

            return num.toFixed(2);
          }
          if (absNum >= 100) {
            return num.toFixed(3);

          var values = [];

          function appendValues(points) {
            (points || []).forEach(function(point) {

          appendValues(observed);

          var minValue = Math.min.apply(null, values);

            +       '<span style="display:inline-flex;align-items:center;gap:4px;opacity:' + (showPrimary ? '1' : '0.45') + ';"><span style="display:inline-block;width:10px;height:2px;background:#16a34a;"></span>' + primaryTitle + '</span>'

            +     '<line x1="' + splitX.toFixed(1) + '" y1="' + padding.top + '" x2="' + splitX.toFixed(1) + '" y2="' + (height - padding.bottom) + '" stroke="rgba(14,165,233,0.35)" stroke-dasharray="4 4"></line>'
            +     '<polyline fill="none" stroke="#64748b" stroke-width="2.2" points="' + pointsText(observed, 'observed') + '"></polyline>'

      do_generate_historical_analysis: function(requestData) {
        var self = this;
        self.lastHistoricalAnalysisRequest = $.extend(true, {}, requestData || {});
        var loadingIndex = layui.layer.load(1, {
          content: '正在识别历史价格事件并关联新闻，请稍候...',
          success: function(layero) {
            layero.find('.layui-layer-content').css({
              'padding-top': '40px',
              'width': '320px'
            });
          }
        });

        $.ajax({
          url: '/api/news/historical_analysis/async',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(requestData),
          timeout: 15000,
          success: function(response) {
            if (response.code === 0 && response.data && response.data.task_id) {
              self.poll_summary_task('/api/news/historical_analysis/task/' + response.data.task_id, loadingIndex, 0, {
                fetchErrorMessage: '查询历史分析任务失败',
                retryErrorMessage: '查询历史分析进度失败，请稍后查看历史记录',
                failPrefix: '生成历史分析失败',
                onSuccess: function(result) {
                  self.show_historical_analysis(result);
                }
              });
            } else {
              layui.layer.close(loadingIndex);
              layui.layer.msg('生成历史分析失败: ' + (response.msg || '未知错误'));
            }
          },
          error: function() {
            layui.layer.close(loadingIndex);
            layui.layer.msg('提交历史分析任务失败，请稍后重试');
          }
        });
      },

            content += '<div style="margin-bottom: 10px; color: #374151; font-size: 13px; line-height: 1.7;">';
            content += '• ' + (item.published_at || '') + ' | ' + (item.storyline || '综合驱动') + ' | 相似度 ' + (item.similarity_score || 0) + '<br>';
            content += '&nbsp;&nbsp;标题：' + (item.title || '无标题') + '<br>';
            content += '&nbsp;&nbsp;当时反应：30分钟 ' + (reaction.follow_30m_pct || 0) + '% / 120分钟 ' + (reaction.follow_120m_pct || 0) + '% / ' + (reaction.absorption_status || 'absorbed');
            content += '</div>';
          });
          content += '</div>';
        }
        if (summaryData && summaryData.event_trade_templates && summaryData.event_trade_templates.length) {
          content += '<div style="margin-bottom: 18px; padding: 14px; background: #f8fafc; border-radius: 8px; border: 1px solid #e5e7eb;">';
          content += '<div style="font-weight: bold; margin-bottom: 10px; color: #111827;">可复用交易模板</div>';
          summaryData.event_trade_templates.slice(0, 3).forEach(function(item) {
            content += '<div style="margin-bottom:10px;padding:10px 12px;border-radius:8px;background:#fff;border:1px solid #e5e7eb;">';
            content += '<div style="font-size:13px;font-weight:700;color:#111827;">' + (item.storyline || '综合驱动') + ' · ' + (item.suggested_side || '观望') + '</div>';
            content += '<div style="margin-top:4px;font-size:12px;line-height:1.8;color:#475569;">触发时间：' + (item.trigger_dt || '--') + '</div>';
            content += '<div style="margin-top:2px;font-size:12px;line-height:1.8;color:#475569;">主因新闻：' + (item.cause_title || '暂无') + '</div>';
            content += '<div style="margin-top:2px;font-size:12px;line-height:1.8;color:#475569;">观察窗口：' + (item.holding_window || '--') + '</div>';
            content += '<div style="margin-top:2px;font-size:12px;line-height:1.8;color:#475569;">历史表现：' + (item.edge_text || '--') + '</div>';
            content += '<div style="margin-top:2px;font-size:12px;line-height:1.8;color:#991b1b;">失效依据：' + (item.invalidation || '--') + '</div>';
            content += '</div>';
          });
          content += '</div>';
        }
        content += this.render_research_workflow_block(summaryData, { showRiskAssessment: false });
        var htmlContent = marked.parse ? marked.parse(summary) : (marked(summary) || summary);
        content += '<div style="line-height: 1.8; color: #333;">' + htmlContent + '</div>';
        content += '</div>';

        layui.layer.open({
          type: 1,
          title: '历史分析',
          area: ['88%', '88%'],
          content: content,
          shadeClose: true,
          maxmin: true,
          btn: ['关闭'],
          btnAlign: 'c',
          success: function(layero) {
            layero.find('.historical-topic-settings-btn').on('click', function() {
              self.open_historical_topic_settings();
            });
            layero.find('.theme-simulation-btn').on('click', function() {
              var button = $(this);
              self.open_theme_simulation({
                current_market: button.data('market') || (summaryData && summaryData.current_market ? summaryData.current_market : ''),
                current_code: button.data('code') || (summaryData && summaryData.current_code ? summaryData.current_code : ''),
                theme_label: button.data('theme') || ''
              });
            });
            if (summaryData && summaryData.topic_timeline && summaryData.topic_timeline.length) {
              self.load_theme_simulation_preview(layero.find('#historical_theme_simulation_preview'), {
                current_market: (summaryData && summaryData.current_market) || Utils.get_market() || '',
                current_code: (summaryData && summaryData.current_code) || Utils.get_code() || '',
                theme_label: summaryData.topic_timeline[0].topic_label || '',
                lookback_hours: (summaryData && summaryData.lookback_hours) || 24,
                max_news: 8
              });
            }
          }
        });
      },
      
      // 生成每日新闻总结
      generate_daily_news_summary: function() {
        var self = this;
        
        // 显示参数选择弹窗
        this.show_daily_news_summary_params_dialog();
      },
      
      // 显示每日新闻总结参数选择弹窗
      show_daily_news_summary_params_dialog: function() {
        var self = this;
        
        var dialogContent = `
          <div style="padding: 20px;">
            <div style="margin-bottom: 20px;">
              <label style="display: block; margin-bottom: 8px; font-weight: bold; color: #333;">📅 新闻日期范围：</label>
              <div style="display: flex; flex-wrap: wrap; gap: 8px;">
                <label style="display: flex; align-items: center; margin-right: 15px; cursor: pointer;">
                  <input type="radio" name="days" value="1" checked style="margin-right: 5px;"> 1天
                </label>
                <label style="display: flex; align-items: center; margin-right: 15px; cursor: pointer;">
                  <input type="radio" name="days" value="3" style="margin-right: 5px;"> 3天
                </label>
                <label style="display: flex; align-items: center; margin-right: 15px; cursor: pointer;">
                  <input type="radio" name="days" value="7" style="margin-right: 5px;"> 7天
                </label>
                <label style="display: flex; align-items: center; margin-right: 15px; cursor: pointer;">
                  <input type="radio" name="days" value="15" style="margin-right: 5px;"> 15天
                </label>
                <label style="display: flex; align-items: center; cursor: pointer;">
                  <input type="radio" name="days" value="30" style="margin-right: 5px;"> 30天
                </label>
              </div>
            </div>
            
            <div style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 4px; border-left: 4px solid #ff9800;">
              <p style="margin: 0; color: #666; font-size: 13px;">
                💡 <strong>提示：</strong>每日新闻总结将先给出交易员速览，只保留主线、必看新闻和重点资产，真正下单前仍建议切到单资产分析。
              </p>
            </div>
          </div>
        `;
        
        layui.layer.open({
          type: 1,
          title: '📰 每日新闻总结参数设置',
          area: ['500px', '350px'],
          content: dialogContent,
          btn: ['开始生成', '取消'],
          btnAlign: 'c',
          yes: function(index, layero) {
            // 获取用户选择的参数
            var selectedDays = layero.find('input[name="days"]:checked').val();
            
            if (!selectedDays) {
              layui.layer.msg('请选择新闻日期范围');
              return false;
            }
            
            // 关闭参数选择弹窗
            layui.layer.close(index);
            
            // 调用实际的生成函数
            self.do_generate_daily_news_summary(parseInt(selectedDays));
          },
          btn2: function(index) {
            layui.layer.close(index);
          },
          shadeClose: false
        });
      },
      
      // 执行每日新闻总结生成
      do_generate_daily_news_summary: function(days) {
        var self = this;
        
        // 显示加载提示
        var loadingIndex = layui.layer.load(1, {
          content: '正在分析' + days + '天内的新闻数据并生成每日总结，请稍候...',
          success: function(layero) {
            layero.find('.layui-layer-content').css({
              'padding-top': '40px',
              'width': '300px'
            });
          }
        });
        
        // 构建请求数据
        var requestData = {
          days: days
        };
        
        // 发送请求生成每日新闻总结
        $.ajax({
          url: '/api/news/daily_summary/async',
          type: 'POST',
          contentType: 'application/json',
          data: JSON.stringify(requestData),
          timeout: 15000,
          success: function(response) {
            if (response.code === 0 && response.data && response.data.task_id) {
              self.poll_summary_task('/api/news/daily_summary/task/' + response.data.task_id, loadingIndex, 0, {
                fetchErrorMessage: '查询每日新闻总结任务失败',
                retryErrorMessage: '查询每日新闻总结进度失败，请稍后查看历史记录',
                failPrefix: '生成每日新闻总结失败',
                onSuccess: function(result) {
                  self.show_daily_news_summary(result);
                }
              });
            } else {
              layui.layer.close(loadingIndex);
              layui.layer.msg('生成每日新闻总结失败: ' + (response.msg || '未知错误'));
            }
          },
          error: function() {
            layui.layer.close(loadingIndex);
            layui.layer.msg('提交每日新闻总结任务失败，请稍后重试');
          }
        });
      },
      
      // 显示每日新闻总结弹窗
      show_daily_news_summary: function(summaryData) {
        var summary = typeof summaryData === 'string' ? summaryData : (summaryData.summary || '');
        var newsCount = summaryData && summaryData.news_count ? summaryData.news_count : 0;
        var days = summaryData && summaryData.days ? summaryData.days : 1;
        var currentDate = new Date().toLocaleDateString('zh-CN');
        var content = '<div style="padding: 20px;">';
        content += '<div style="margin-bottom: 20px; padding: 15px; background-color: #fff3e0; border-left: 4px solid #ff9800; border-radius: 4px;">';
        content += '<h4 style="margin: 0 0 10px 0; color: #333;">📰 ' + currentDate + ' 每日新闻总结</h4>';
        content += '<p style="margin: 0; color: #666; font-size: 12px;">过去 ' + days + ' 天新闻交易简报';
        if (newsCount) {
          content += '，本次使用 ' + newsCount + ' 条新闻';
        }
        content += '</p>';
        content += '</div>';
        content += this.render_trader_decision_block(summaryData && summaryData.trader_brief ? summaryData.trader_brief : {}, { title: '交易员速览' });
        // 使用marked.js将Markdown转换为HTML
        var htmlContent = marked.parse ? marked.parse(summary) : (marked(summary) || summary);
        content += '<div style="line-height: 1.8; color: #333;">' + htmlContent + '</div>';
        content += '</div>';
        
        layui.layer.open({
          type: 1,
          title: '每日新闻总结',
          area: ['85%', '85%'],
          content: content,
          shadeClose: true,
          maxmin: true,
          btn: ['关闭'],
          btnAlign: 'c'
        });
      }
    };
  </script>
</html>
